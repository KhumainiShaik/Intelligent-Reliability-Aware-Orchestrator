name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Python lint ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check --output-format=github controller/ kisim/ evaluation/ tests/

      - name: Ruff format check
        run: ruff format --check controller/ kisim/ evaluation/ tests/

      - name: Mypy
        run: python -m mypy --explicit-package-bases controller

  # ── Python tests ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=controller --cov-report=term-missing --cov-report=xml -v tests/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Helm lint ────────────────────────────────────────────────
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint controller chart
        run: helm lint charts/controller/

      - name: Lint workload chart
        run: helm lint charts/workload/

      - name: Lint monitoring chart
        run: helm lint charts/monitoring/

      - name: Lint portable workload chart
        run: helm lint charts/portable-workload/

      - name: Template controller chart
        run: helm template test charts/controller/ > /dev/null

      - name: Template workload chart
        run: helm template test charts/workload/ > /dev/null

      - name: Template monitoring chart
        run: helm template test charts/monitoring/ > /dev/null

      - name: Template portable workload chart
        run: helm template test charts/portable-workload/ > /dev/null

  # ── Go build (workload) ─────────────────────────────────────
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Build workload
        run: go build -ldflags="-s -w" -o /dev/null ./workload/

      - name: Vet
        run: go vet ./workload/

  # ── Docker build (no push) ──────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test, go-build]
    strategy:
      matrix:
        image:
          - { context: ".", dockerfile: "controller/Dockerfile", name: "controller" }
          - { context: ".", dockerfile: "workload/Dockerfile", name: "workload" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: ${{ matrix.image.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
