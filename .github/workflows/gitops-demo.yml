name: GitOps Demo

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/gitops-demo.yml"
      - "demo-dashboard/Dockerfile"
      - "demo-dashboard/app.py"
      - "demo-dashboard/requirements.txt"
      - "demo-dashboard/static/**"
      - "demo-dashboard/templates/**"
      - "demo/**"
      - "gitops/**"
      - "charts/portable-workload/**"
      - "scripts/gitops/**"
  workflow_dispatch:
    inputs:
      monitor_duration_secs:
        description: "How long to monitor rollout status"
        required: false
        default: "300"
      force_refresh:
        description: "Explicitly request Argo CD hard refresh before verification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: gitops-demo-main
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: level-slate-494713-u5
  GCP_REGION: europe-west2
  GKE_CLUSTER_NAME: orchestrated-rollout
  AR_REPO: oroll
  DASHBOARD_APP_NAME: rollout-demo-dashboard
  DASHBOARD_MANIFEST_PATH: demo-dashboard/k8s/deployment.yaml
  WORKLOAD_APP_NAME: workload-cpu-bound-fastapi
  WORKLOAD_NAMESPACE: workload-cpu
  ORCHESTRATED_ROLLOUT_NAME: cpu-bound-fastapi-portability-template
  MONITOR_DURATION_SECS: ${{ github.event.inputs.monitor_duration_secs || '300' }}
  FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          GCP_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${GCP_SERVICE_ACCOUNT_KEY_B64}" ]; then
            echo "Missing GitHub secret: GCP_SERVICE_ACCOUNT_KEY_B64"
            echo ""
            echo "Bootstrap it locally with:"
            echo "  cd aks85"
            echo "  export GITHUB_REPOSITORY='<owner>/<repo>'"
            echo "  export GCP_SERVICE_ACCOUNT_KEY_FILE=\"\$HOME/.config/aks85/github-actions-gitops-demo.json\""
            echo "  ./scripts/gitops/bootstrap_github_actions_secrets.sh"
            exit 1
          fi
          echo "Required GitHub secrets are present."

  build-dashboard-image:
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      dashboard-image: ${{ steps.meta.outputs.dashboard_image }}
      dashboard-tag: ${{ steps.meta.outputs.dashboard_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Generate timestamped image tag
        run: |
          set -euo pipefail
          DASHBOARD_TAG="gitops_demo_$(date -u +%Y%m%d_%H%M%S)_${GITHUB_SHA::7}"
          DASHBOARD_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/rollout-demo-dashboard:${DASHBOARD_TAG}"
          echo "dashboard_tag=${DASHBOARD_TAG}" >> "${GITHUB_OUTPUT}"
          echo "dashboard_image=${DASHBOARD_IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "Dashboard image: ${DASHBOARD_IMAGE}"

      - name: Docker login to Artifact Registry
        env:
          GCP_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          set -euo pipefail
          echo "${GCP_SERVICE_ACCOUNT_KEY_B64}" | base64 -d | docker login -u _json_key --password-stdin "https://${GCP_REGION}-docker.pkg.dev"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: demo-dashboard
          file: demo-dashboard/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.dashboard_image }}

  update-gitops-desired-state:
    runs-on: ubuntu-latest
    needs: build-dashboard-image
    outputs:
      desired-state-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install manifest update dependency
        run: python3 -m pip install pyyaml

      - name: Update dashboard image in Git desired state
        env:
          DASHBOARD_IMAGE: ${{ needs.build-dashboard-image.outputs.dashboard-image }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          from pathlib import Path
          import yaml

          path = Path(os.environ["DASHBOARD_MANIFEST_PATH"])
          docs = list(yaml.safe_load_all(path.read_text()))
          image = os.environ["DASHBOARD_IMAGE"]

          changed = False
          for doc in docs:
              if not isinstance(doc, dict):
                  continue
              if doc.get("kind") != "Deployment":
                  continue
              containers = (
                  doc.get("spec", {})
                  .get("template", {})
                  .get("spec", {})
                  .get("containers", [])
              )
              for container in containers:
                  if container.get("name") == "dashboard":
                      container["image"] = image
                      changed = True

          if not changed:
              raise SystemExit("dashboard container not found in manifest")

          path.write_text("---\n".join(yaml.safe_dump(doc, sort_keys=False) for doc in docs))
          PY
          git diff -- "${DASHBOARD_MANIFEST_PATH}"

      - id: commit
        name: Commit and push Git desired state
        env:
          DASHBOARD_TAG: ${{ needs.build-dashboard-image.outputs.dashboard-tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "${DASHBOARD_MANIFEST_PATH}"; then
            echo "No desired-state change to commit."
            echo "sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git add "${DASHBOARD_MANIFEST_PATH}"
          git commit -m "gitops: update dashboard image ${DASHBOARD_TAG}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

  verify-argocd-reconciliation:
    runs-on: ubuntu-latest
    needs:
      - build-dashboard-image
      - update-gitops-desired-state
    steps:
      - uses: actions/checkout@v4

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin,kubectl

      - name: Authenticate to Google Cloud
        env:
          GCP_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          set -euo pipefail
          echo "${GCP_SERVICE_ACCOUNT_KEY_B64}" | base64 -d > "${RUNNER_TEMP}/gcp-key.json"
          gcloud auth activate-service-account --key-file="${RUNNER_TEMP}/gcp-key.json"
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" --region "${GCP_REGION}" --project "${GCP_PROJECT_ID}"

      - name: Verify Argo CD reconciliation
        env:
          DASHBOARD_IMAGE: ${{ needs.build-dashboard-image.outputs.dashboard-image }}
          DESIRED_STATE_SHA: ${{ needs.update-gitops-desired-state.outputs.desired-state-sha }}
        run: |
          set -euo pipefail

          if [ "${FORCE_REFRESH}" = "true" ]; then
            echo "force_refresh=true, explicitly requesting Argo CD hard refresh."
            kubectl annotate application -n argocd "${DASHBOARD_APP_NAME}" \
              argocd.argoproj.io/refresh=hard --overwrite
            kubectl annotate application -n argocd "${WORKLOAD_APP_NAME}" \
              argocd.argoproj.io/refresh=hard --overwrite
          fi

          for i in $(seq 1 60); do
            DASH_SYNC=$(kubectl get application -n argocd "${DASHBOARD_APP_NAME}" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            DASH_HEALTH=$(kubectl get application -n argocd "${DASHBOARD_APP_NAME}" -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            DASH_REVISION=$(kubectl get application -n argocd "${DASHBOARD_APP_NAME}" -o jsonpath='{.status.sync.revision}' 2>/dev/null || true)
            WORKLOAD_SYNC=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            WORKLOAD_HEALTH=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            WORKLOAD_REVISION=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.sync.revision}' 2>/dev/null || true)

            echo "[$i/60] dashboard sync=${DASH_SYNC:-unknown} health=${DASH_HEALTH:-unknown} revision=${DASH_REVISION:-unknown}"
            echo "[$i/60] workload  sync=${WORKLOAD_SYNC:-unknown} health=${WORKLOAD_HEALTH:-unknown} revision=${WORKLOAD_REVISION:-unknown}"

            if [ "${DASH_SYNC}" = "Synced" ] && [ "${DASH_HEALTH}" = "Healthy" ] && \
               [ "${WORKLOAD_SYNC}" = "Synced" ] && [ "${WORKLOAD_HEALTH}" = "Healthy" ]; then
              break
            fi
            sleep 10
          done

          echo ""
          echo "Argo CD Applications:"
          kubectl get application -n argocd "${DASHBOARD_APP_NAME}" -o wide
          kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o wide

          echo ""
          echo "Dashboard deployment image:"
          kubectl -n rollout-demo get deployment rollout-demo-dashboard -o jsonpath='{.spec.template.spec.containers[?(@.name=="dashboard")].image}{"\n"}' || true

          echo ""
          echo "Latest OrchestratedRollout decision:"
          kubectl -n "${WORKLOAD_NAMESPACE}" get orchestratedrollout "${ORCHESTRATED_ROLLOUT_NAME}" \
            -o jsonpath='{.metadata.name}{"\nphase="}{.status.phase}{"\nstrategy="}{.status.chosenStrategy}{"\nheadroom="}{.status.preScaleExtraReplicas}{"\nmessage="}{.status.message}{"\n"}' || true

          echo ""
          echo "Expected dashboard image: ${DASHBOARD_IMAGE}"
          echo "Desired state commit: ${DESIRED_STATE_SHA}"
