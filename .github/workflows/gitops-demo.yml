name: GitOps Demo

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/gitops-demo.yml"
      - "gitops/workloads/cpu-bound-fastapi/values.yaml"
      - "charts/portable-workload/**"
      - "workloads/cpu-bound-fastapi/**"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Explicitly request Argo CD hard refresh before read-only verification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: gitops-demo-main
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: level-slate-494713-u5
  GCP_REGION: europe-west2
  GKE_CLUSTER_NAME: orchestrated-rollout
  VALUES_PATH: gitops/workloads/cpu-bound-fastapi/values.yaml
  WORKLOAD_APP_NAME: workload-cpu-bound-fastapi
  WORKLOAD_NAMESPACE: workload-cpu
  ORCHESTRATED_ROLLOUT_NAME: cpu-bound-fastapi-portability-template
  FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          GCP_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${GCP_SERVICE_ACCOUNT_KEY_B64}" ]; then
            echo "Missing GitHub secret: GCP_SERVICE_ACCOUNT_KEY_B64"
            echo ""
            echo "Bootstrap it locally with:"
            echo "  cd aks85"
            echo "  export GITHUB_REPOSITORY='<owner>/<repo>'"
            echo "  export GCP_SERVICE_ACCOUNT_KEY_FILE=\"\$HOME/.config/aks85/github-actions-gitops-demo.json\""
            echo "  ./scripts/gitops/bootstrap_github_actions_secrets.sh"
            exit 1
          fi
          echo "Required GitHub secrets are present."

  build-workload-image:
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      workload-name: ${{ steps.values.outputs.workload_name }}
      workload-image: ${{ steps.values.outputs.workload_image }}
      image-repository: ${{ steps.values.outputs.image_repository }}
      image-tag: ${{ steps.values.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Install values parser dependency
        run: python3 -m pip install pyyaml

      - id: values
        name: Read image from GitOps values
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          from pathlib import Path

          import yaml

          values = yaml.safe_load(Path(os.environ["VALUES_PATH"]).read_text())
          workload_name = values.get("workload", {}).get("name", "cpu-bound-fastapi")
          image_repository = values["image"]["repository"]
          image_tag = values["image"]["tag"]
          image = f"{image_repository}:{image_tag}"
          context = f"workloads/{workload_name}"

          if image_tag.startswith("portability_"):
              raise SystemExit(
                  "Refusing to run demo with portability image tag. "
                  "Commit the desired release tag, for example image.tag: v2.0.0."
              )
          if not Path(context, "Dockerfile").exists():
              raise SystemExit(f"Dockerfile not found for workload context: {context}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"workload_name={workload_name}\n")
              out.write(f"image_repository={image_repository}\n")
              out.write(f"image_tag={image_tag}\n")
              out.write(f"workload_image={image}\n")
              out.write(f"workload_context={context}\n")

          print(f"Workload: {workload_name}")
          print(f"Image declared by Git desired state: {image}")
          PY

      - name: Docker login to Artifact Registry
        env:
          GCP_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          set -euo pipefail
          echo "${GCP_SERVICE_ACCOUNT_KEY_B64}" | base64 -d | docker login -u _json_key --password-stdin "https://${GCP_REGION}-docker.pkg.dev"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push declared workload image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.values.outputs.workload_context }}
          file: ${{ steps.values.outputs.workload_context }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.values.outputs.workload_image }}

  verify-argocd-reconciliation:
    runs-on: ubuntu-latest
    needs: build-workload-image
    steps:
      - uses: actions/checkout@v4

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin,kubectl

      - name: Authenticate to Google Cloud
        env:
          GCP_SERVICE_ACCOUNT_KEY_B64: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_B64 }}
        run: |
          set -euo pipefail
          echo "${GCP_SERVICE_ACCOUNT_KEY_B64}" | base64 -d > "${RUNNER_TEMP}/gcp-key.json"
          gcloud auth activate-service-account --key-file="${RUNNER_TEMP}/gcp-key.json"
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" --region "${GCP_REGION}" --project "${GCP_PROJECT_ID}"

      - name: Verify Argo CD reconciliation
        env:
          EXPECTED_IMAGE: ${{ needs.build-workload-image.outputs.workload-image }}
          EXPECTED_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "${FORCE_REFRESH}" = "true" ]; then
            echo "force_refresh=true, explicitly requesting Argo CD hard refresh."
            kubectl annotate application -n argocd "${WORKLOAD_APP_NAME}" \
              argocd.argoproj.io/refresh=hard --overwrite
          fi

          APP_READY="false"
          for i in $(seq 1 60); do
            SYNC=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            HEALTH=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            REVISION=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.sync.revision}' 2>/dev/null || true)
            DEPLOY_IMAGE=$(kubectl -n "${WORKLOAD_NAMESPACE}" get deployment cpu-bound-fastapi -o jsonpath='{.spec.template.spec.containers[?(@.name=="workload")].image}' 2>/dev/null || true)
            OROLL_PHASE=$(kubectl -n "${WORKLOAD_NAMESPACE}" get orchestratedrollout "${ORCHESTRATED_ROLLOUT_NAME}" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            OROLL_STRATEGY=$(kubectl -n "${WORKLOAD_NAMESPACE}" get orchestratedrollout "${ORCHESTRATED_ROLLOUT_NAME}" -o jsonpath='{.status.chosenStrategy}' 2>/dev/null || true)

            echo "[$i/60] app sync=${SYNC:-unknown} health=${HEALTH:-unknown} revision=${REVISION:-unknown}"
            echo "[$i/60] deployment image=${DEPLOY_IMAGE:-unknown}"
            echo "[$i/60] orchestratedrollout phase=${OROLL_PHASE:-unknown} strategy=${OROLL_STRATEGY:-unknown}"

            if [ "${SYNC}" = "Synced" ] && [ "${HEALTH}" = "Healthy" ] && \
               [ "${REVISION}" = "${EXPECTED_REVISION}" ] && \
               [ "${DEPLOY_IMAGE}" = "${EXPECTED_IMAGE}" ] && \
               [ -n "${OROLL_STRATEGY}" ]; then
              APP_READY="true"
              break
            fi
            sleep 10
          done

          echo ""
          echo "Argo CD application:"
          kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o wide

          echo ""
          echo "Argo CD revision:"
          kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='sync={.status.sync.status}{"\n"}health={.status.health.status}{"\n"}revision={.status.sync.revision}{"\n"}'

          echo ""
          echo "Workload deployment image:"
          kubectl -n "${WORKLOAD_NAMESPACE}" get deployment cpu-bound-fastapi -o jsonpath='{.spec.template.spec.containers[?(@.name=="workload")].image}{"\n"}'

          echo ""
          echo "Latest OrchestratedRollout decision:"
          kubectl -n "${WORKLOAD_NAMESPACE}" get orchestratedrollout "${ORCHESTRATED_ROLLOUT_NAME}" \
            -o jsonpath='{.metadata.name}{"\nphase="}{.status.phase}{"\nstrategy="}{.status.chosenStrategy}{"\nheadroom="}{.status.preScaleExtraReplicas}{"\npolicy="}{.status.policyVersion}{"\nmessage="}{.status.message}{"\n"}'

          echo ""
          echo "Argo Rollout status:"
          kubectl -n "${WORKLOAD_NAMESPACE}" get rollout cpu-bound-fastapi-rollout \
            -o jsonpath='{.metadata.name}{"\nphase="}{.status.phase}{"\nhealthy="}{.status.healthy}{"\nmessage="}{.status.message}{"\n"}' || true

          echo ""
          echo "Expected triggering Git commit: ${EXPECTED_REVISION}"
          echo "Expected workload image: ${EXPECTED_IMAGE}"

          if [ "${APP_READY}" != "true" ]; then
            echo "Argo CD did not reconcile the triggering commit and workload image within 10 minutes."
            exit 1
          fi
