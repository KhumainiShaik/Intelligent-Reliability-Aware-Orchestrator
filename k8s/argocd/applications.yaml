# Argo CD Application — Workload (Helm)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orchestrated-rollout-workload
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: orchestrated-rollout
spec:
  project: default
  source:
    # Update with your actual Git repo URL
    repoURL: https://github.com/khumaini/orchestrated-rollout.git
    targetRevision: main
    path: charts/workload
    helm:
      releaseName: workload
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: orchestrated-rollout
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
