# LitmusChaos Network Latency Experiment
# Injects network latency into workload pods during rollout windows
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: workload-network-latency
  namespace: orchestrated-rollout
  labels:
    app.kubernetes.io/part-of: orchestrated-rollout
    experiment: network-latency
spec:
  appinfo:
    appns: orchestrated-rollout
    applabel: "app.kubernetes.io/name=workload,app.kubernetes.io/instance=workload"
    appkind: deployment
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-network-latency
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: NETWORK_LATENCY
              value: "200"
            - name: NETWORK_INTERFACE
              value: "eth0"
            - name: PODS_AFFECTED_PERC
              value: "50"
            - name: CONTAINER_RUNTIME
              value: "containerd"
            - name: SOCKET_PATH
              value: "/run/containerd/containerd.sock"
        probe: []
