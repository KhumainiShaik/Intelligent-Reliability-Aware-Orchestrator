# Baseline: Fixed Canary Strategy
# Common production pattern: all rollouts as canary with static traffic split.
# Represents a rule-of-thumb "always use canary in prod" approach.
apiVersion: rollout.orchestrated.io/v1alpha1
kind: OrchestratedRollout
metadata:
  name: workload-v2-rollout
  namespace: orchestrated-rollout
  labels:
    app: workload
    experiment.baseline: "canary"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workload-workload

  release:
    image: skkhumaini1119/orchestrated-rollout-workload
    tag: v0.1.0

  actionSet:
    - canary

  slo:
    maxP95LatencyMs: 100
    maxErrorRate: 0.01

  rolloutHints:
    targetReplicas: 4
    warmUpClass: medium

  guardrailConfig:
    maxDelaySeconds: 120
    maxExtraReplicas: 5
    maxRolloutTimeSeconds: 600
