# Workload Helm values
replicaCount: 2

image:
  repository: orchestrated-rollout-workload
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

workload:
  port: 8080
  warmupDelay: "5s"
  # cpuWorkMs: real CPU-burning loop per request (see workload/main.go simulateCPUWork).
  # GKE tuning: 5ms × 100 RPS / 2 pods = 250ms CPU/s per pod vs 250m limit →
  # exactly at capacity under steady load. HPA scales to 3-4 pods quickly,
  # settling p95 ~20-50ms. During rollout disruption stress_score rises to 0.3-0.6,
  # giving the RL policy meaningful signal to differentiate strategies.
  cpuWorkMs: 5
  version: "v1.0.0"
  bgGradient: "#667eea, #764ba2"

ingress:
  enabled: true
  className: nginx
  host: workload.local

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilization: 60
  scaleUp:
    stabilizationWindowSeconds: 30
    maxPods: 4
    maxPercent: 100
    periodSeconds: 60
  scaleDown:
    stabilizationWindowSeconds: 120
    maxPods: 2
    periodSeconds: 60

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
