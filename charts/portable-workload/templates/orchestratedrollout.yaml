{{- if .Values.orchestratedRollout.enabled }}
{{- $rolloutHints := default dict .Values.orchestratedRollout.rolloutHints }}
apiVersion: rollout.orchestrated.io/v1alpha1
kind: OrchestratedRollout
metadata:
  name: {{ include "portable-workload.fullname" . }}-portability-template
  labels:
    {{- include "portable-workload.labels" . | nindent 4 }}
    portability.orchestrated.io/template: "true"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "portable-workload.fullname" . }}
  release:
    image: {{ .Values.image.repository | quote }}
    tag: {{ .Values.image.tag | quote }}
  actionSet:
    {{- range .Values.orchestratedRollout.actionSet }}
    - {{ . | quote }}
    {{- end }}
  slo:
    maxP95LatencyMs: {{ .Values.slo.p95Ms }}
    maxErrorRate: 0.01
  rolloutHints:
    trafficProfile: {{ default .Values.orchestratedRollout.trafficProfile $rolloutHints.trafficProfile | quote }}
    objective: {{ default .Values.orchestratedRollout.objective $rolloutHints.objective | quote }}
    policyVariant: {{ default .Values.orchestratedRollout.policyVariant $rolloutHints.policyVariant | quote }}
    faultContext: {{ default .Values.orchestratedRollout.faultContext $rolloutHints.faultContext | quote }}
    warmUpClass: {{ .Values.modelProfile.coldStartClass | quote }}
    imageSizeClass: {{ .Values.modelProfile.sizeClass | quote }}
{{- end }}
