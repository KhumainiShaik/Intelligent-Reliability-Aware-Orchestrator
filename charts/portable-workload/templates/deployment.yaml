apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portable-workload.fullname" . }}
  labels:
    {{- include "portable-workload.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "portable-workload.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portable-workload.selectorLabels" . | nindent 8 }}
        version: {{ .Values.workload.version | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "{{ .Values.service.targetPort }}"
    spec:
      containers:
        - name: workload
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: WORKLOAD_NAME
              value: {{ .Values.workload.name | quote }}
            - name: WORKLOAD_CLASS
              value: {{ .Values.workload.class | quote }}
            - name: WORKLOAD_KIND
              value: {{ .Values.workload.kind | quote }}
            - name: VERSION
              value: {{ .Values.workload.version | quote }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
