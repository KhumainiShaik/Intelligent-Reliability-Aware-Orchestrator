replicaCount: 2

workload:
  name: portable-workload
  class: http
  kind: http
  version: v1.0.0

image:
  repository: portable-workload
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTarget: 60

env: []

slo:
  p95Ms: 500

modelProfile:
  domain: none
  framework: none
  sizeClass: small
  coldStartClass: fast
  sloP95Ms: 500

serviceMonitor:
  enabled: false

orchestratedRollout:
  enabled: true
  actionSet:
    - rl
  rolloutHints:
    trafficProfile: ramp
    objective: reliability
    policyVariant: v12-contextual
    faultContext: none
