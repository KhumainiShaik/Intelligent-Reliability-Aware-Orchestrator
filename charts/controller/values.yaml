# Controller Helm values
replicaCount: 1

image:
  repository: orchestrated-rollout-controller
  tag: "latest"
  pullPolicy: IfNotPresent

controller:
  namespaceScoped: false
  prometheusUrl: "http://prometheus.monitoring.svc.cluster.local:9090"
  policyPath: "/policy/artifact"
  policyMode: "rl"  # rl | rule-based
  episodeLogPath: "/episodes"
  logLevel: "INFO"
  logFormat: "json"

serviceAccount:
  name: ""

rbac:
  create: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
