apiVersion: v1
kind: Namespace
metadata:
  name: rollout-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-demo-dashboard
  namespace: rollout-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rollout-demo-dashboard-readonly
rules:
  - apiGroups: ["rollout.orchestrated.io"]
    resources: ["orchestratedrollouts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rollout-demo-dashboard-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rollout-demo-dashboard-readonly
subjects:
  - kind: ServiceAccount
    name: rollout-demo-dashboard
    namespace: rollout-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-demo-dashboard
  namespace: rollout-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollout-demo-dashboard
  template:
    metadata:
      labels:
        app: rollout-demo-dashboard
    spec:
      serviceAccountName: rollout-demo-dashboard
      containers:
        - name: dashboard
          image: rollout-demo-dashboard
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DEMO_NAMESPACES
              value: workload-go,workload-cpu,workload-io,workload-mobilenet,workload-squeezenet,workload-tabular
            - name: PROMETHEUS_URL
              value: http://prometheus.monitoring.svc.cluster.local:9090
---
apiVersion: v1
kind: Service
metadata:
  name: rollout-demo-dashboard
  namespace: rollout-demo
spec:
  type: ClusterIP
  selector:
    app: rollout-demo-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 8080
