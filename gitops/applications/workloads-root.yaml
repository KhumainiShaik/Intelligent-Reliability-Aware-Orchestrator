apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: orchestrated-rollout-portability
spec:
  project: default
  source:
    repoURL: https://github.com/KhumainiShaik/Intelligent-Reliability-Aware-Orchestrator.git
    targetRevision: main
    path: gitops/applications
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
