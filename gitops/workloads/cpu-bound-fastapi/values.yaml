replicaCount: 2
workload:
  name: cpu-bound-fastapi
  class: http
  kind: http
  version: v3.1.1
image:
  repository: europe-west2-docker.pkg.dev/level-slate-494713-u5/oroll/cpu-bound-fastapi
  tag: v3.1.1
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
resources:
  requests:
    cpu: 150m
    memory: 128Mi
  limits:
    cpu: 750m
    memory: 512Mi
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTarget: 60
env:
    - name: CPU_WORK_MS
      value: '30'
    - name: WARMUP_SECONDS
      value: '2'
slo:
  p95Ms: 500
modelProfile:
  domain: none
  framework: none
  sizeClass: small
  coldStartClass: fast
  sloP95Ms: 500
serviceMonitor:
  enabled: false
orchestratedRollout:
  enabled: true
  actionSet:
    - rl
  rolloutHints:
    trafficProfile: ramp
    objective: reliability
    policyVariant: v12-contextual
    faultContext: none
