replicaCount: 2
workload:
  name: squeezenet-onnx
  class: ml
  kind: ml
  version: v1.0.0
image:
  repository: europe-west2-docker.pkg.dev/level-slate-494713-u5/oroll/orchestrated-rollout-ml-workload
  tag: portability_20260509
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 768Mi
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTarget: 60
env:
    - name: MODEL_PATH
      value: '/app/model/mobilenetv2.onnx'
    - name: WARMUP_DELAY_SECS
      value: '8'
slo:
  p95Ms: 500
modelProfile:
  domain: vision
  framework: onnxruntime
  sizeClass: small
  coldStartClass: fast
  sloP95Ms: 500
serviceMonitor:
  enabled: false
orchestratedRollout:
  enabled: false
  actionSet:
    - rl
    - pre-scale
  trafficProfile: ramp
  objective: reliability
  policyVariant: v12-contextual
  faultContext: none
