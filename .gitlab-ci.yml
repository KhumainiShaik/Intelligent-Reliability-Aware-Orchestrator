stages:
  - preflight
  - build
  - deploy
  - gitops-sync
  - monitor
  - prepare-gitops-change

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

variables:
  GCP_PROJECT_ID: "level-slate-494713-u5"
  GCP_REGION: "europe-west2"
  GKE_CLUSTER_NAME: "orchestrated-rollout"
  AR_REPO: "oroll"
  DASHBOARD_NAMESPACE: "rollout-demo"
  DASHBOARD_DEPLOYMENT: "rollout-demo-dashboard"
  WORKLOAD_APP_NAME: "workload-cpu-bound-fastapi"
  WORKLOAD_NAMESPACE: "workload-cpu"
  WORKLOAD_VALUES_PATH: "gitops/workloads/cpu-bound-fastapi/values.yaml"
  ORCHESTRATED_ROLLOUT_NAME: "cpu-bound-fastapi-portability-template"
  WORKLOAD_VERSION: "v2.0.0"
  IMAGE_TAG: "v2.0.0"
  TRAFFIC_PROFILE: "ramp"
  OBJECTIVE: "reliability"
  POLICY_VARIANT: "v12-contextual"
  FAULT_CONTEXT: "none"
  MONITOR_DURATION_SECS: "300"
  GIT_DEPTH: "0"
  DOCKER_CONFIG: "/kaniko/.docker"

.kubectl_context:
  before_script:
    - |
      if ! command -v kubectl >/dev/null 2>&1; then
        gcloud components install kubectl gke-gcloud-auth-plugin --quiet
      fi
    - |
      if [ -n "${GCP_SERVICE_ACCOUNT_KEY_B64:-}" ]; then
        echo "${GCP_SERVICE_ACCOUNT_KEY_B64}" | base64 -d > /tmp/gcp-key.json
        gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
        gcloud config set project "${GCP_PROJECT_ID}"
        gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" --region "${GCP_REGION}" --project "${GCP_PROJECT_ID}"
      elif [ -n "${GCP_SERVICE_ACCOUNT_KEY:-}" ]; then
        printf '%s' "${GCP_SERVICE_ACCOUNT_KEY}" > /tmp/gcp-key.json
        gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
        gcloud config set project "${GCP_PROJECT_ID}"
        gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" --region "${GCP_REGION}" --project "${GCP_PROJECT_ID}"
      fi
    - |
      if [ -n "${KUBECONFIG_B64:-}" ]; then
        echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
        export KUBECONFIG="${PWD}/kubeconfig"
      fi
    - |
      if [ -n "${KUBE_CONTEXT:-}" ]; then
        kubectl config use-context "${KUBE_CONTEXT}"
      fi

preflight:production-demo:
  stage: preflight
  image: alpine:3.20
  script:
    - |
      set -euo pipefail
      missing=0
      require_var() {
        if [ -z "$(eval "printf '%s' \"\${$1:-}\"")" ]; then
          echo "missing required GitLab CI/CD variable: $1"
          missing=1
        fi
      }
      require_var GCP_SERVICE_ACCOUNT_KEY_B64
      if [ "${missing}" -ne 0 ]; then
        echo ""
        echo "Bootstrap the fixed production variables once from a local machine:"
        echo ""
        echo "  cd aks85"
        echo "  export GITLAB_TOKEN='<gitlab-api-token>'"
        echo "  export GCP_SERVICE_ACCOUNT_KEY_FILE=\"\$HOME/keys/aks85-gitops-demo.json\""
        echo "  ./scripts/gitops/bootstrap_gitlab_ci_variables.sh"
        echo ""
        exit 1
      fi
      echo "Production GitOps demo variables are present."
      echo "Project=${GCP_PROJECT_ID} Region=${GCP_REGION} Cluster=${GKE_CLUSTER_NAME} ArtifactRepo=${AR_REPO}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

build:dashboard-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  needs:
    - preflight:production-demo
  script:
    - |
      set -euo pipefail
      DASHBOARD_TAG="${DASHBOARD_TAG:-gitops_demo_$(date -u +%Y%m%d_%H%M%S)_${CI_COMMIT_SHORT_SHA}}"
      DASHBOARD_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/rollout-demo-dashboard:${DASHBOARD_TAG}"
      echo "DASHBOARD_TAG=${DASHBOARD_TAG}" | tee build.env
      echo "DASHBOARD_IMAGE=${DASHBOARD_IMAGE}" | tee -a build.env
      echo "Dashboard image: ${DASHBOARD_IMAGE}"
      if [ -n "${GCP_SERVICE_ACCOUNT_KEY_B64:-}" ]; then
        echo "${GCP_SERVICE_ACCOUNT_KEY_B64}" | base64 -d > /tmp/gcp-key.json
      else
        echo "GCP_SERVICE_ACCOUNT_KEY_B64 is required"
        exit 1
      fi
      mkdir -p /kaniko/.docker
      AUTH="$(printf '_json_key:%s' "$(cat /tmp/gcp-key.json)" | base64 | tr -d '\n')"
      printf '{"auths":{"https://%s-docker.pkg.dev":{"auth":"%s"}}}\n' "${GCP_REGION}" "${AUTH}" > /kaniko/.docker/config.json
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/demo-dashboard" \
        --dockerfile "${CI_PROJECT_DIR}/demo-dashboard/Dockerfile" \
        --destination "${DASHBOARD_IMAGE}" \
        --custom-platform linux/amd64
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

deploy:dashboard:
  stage: deploy
  image: google/cloud-sdk:latest
  extends: .kubectl_context
  needs:
    - job: build:dashboard-image
      artifacts: true
  script:
    - |
      set -euo pipefail
      echo "Deploying ${DASHBOARD_IMAGE} to ${DASHBOARD_NAMESPACE}/${DASHBOARD_DEPLOYMENT}"
      kubectl apply -f demo-dashboard/k8s/deployment.yaml
      kubectl -n "${DASHBOARD_NAMESPACE}" set image "deployment/${DASHBOARD_DEPLOYMENT}" "dashboard=${DASHBOARD_IMAGE}"
      kubectl -n "${DASHBOARD_NAMESPACE}" rollout status "deployment/${DASHBOARD_DEPLOYMENT}" --timeout=5m
      kubectl -n "${DASHBOARD_NAMESPACE}" get deployment "${DASHBOARD_DEPLOYMENT}" -o wide
      kubectl -n "${DASHBOARD_NAMESPACE}" get pods -l app=rollout-demo-dashboard -o wide
  environment:
    name: production
    kubernetes:
      namespace: rollout-demo
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

argocd:refresh:
  stage: gitops-sync
  image: google/cloud-sdk:latest
  extends: .kubectl_context
  needs:
    - deploy:dashboard
  script:
    - |
      set -euo pipefail
      echo "Refreshing Argo CD Application ${WORKLOAD_APP_NAME}"
      kubectl annotate application -n argocd "${WORKLOAD_APP_NAME}" \
        argocd.argoproj.io/refresh=hard --overwrite
      for i in $(seq 1 60); do
        SYNC=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
        HEALTH=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.health.status}' 2>/dev/null || true)
        REVISION=$(kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o jsonpath='{.status.sync.revision}' 2>/dev/null || true)
        echo "[$i/60] sync=${SYNC:-unknown} health=${HEALTH:-unknown} revision=${REVISION:-unknown}"
        if [ "${SYNC}" = "Synced" ] && [ "${HEALTH}" = "Healthy" ]; then
          break
        fi
        sleep 5
      done
      kubectl get application -n argocd "${WORKLOAD_APP_NAME}" -o wide
  environment:
    name: production
    kubernetes:
      namespace: argocd
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

monitor:rollout:
  stage: monitor
  image: google/cloud-sdk:latest
  extends: .kubectl_context
  needs:
    - argocd:refresh
  script:
    - bash scripts/gitops/monitor_rollout.sh
  artifacts:
    when: always
    paths:
      - rollout-status-*/
    expire_in: 7 days
  environment:
    name: production
    kubernetes:
      namespace: workload-cpu
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

prepare:cpu-v2-values:
  stage: prepare-gitops-change
  image: python:3.11
  script:
    - pip install pyyaml -q
    - bash scripts/gitops/update_rollout_config.sh
    - git diff -- "${WORKLOAD_VALUES_PATH}"
  artifacts:
    paths:
      - "${WORKLOAD_VALUES_PATH}"
    reports:
      dotenv: update-config.env
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
